name: Update Brave Origin Beta

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix-shell -p curl gnused nix jq --run "bash ./update.sh"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet package.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            VERSION=$(grep 'version = ' package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.diff.outputs.changed == 'true'
        run: nix build .#brave-origin-beta --no-link

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix
          git commit -m "brave-origin-beta: update to ${{ steps.diff.outputs.version }}"
          git push
